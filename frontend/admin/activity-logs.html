<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity Logs | PrimeTrade</title>

    <link rel="stylesheet" href="../css/global.css" />

    <link rel="stylesheet" href="../css/manage-nav.css" />

    <link rel="stylesheet" href="../css/activity-logs.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>

  <body>
    <div id="manageNavContainer"></div>

    <div id="modalContainer"></div>

    <main class="manage-main">
      <!--==========================================================

PAGE HEADER

===========================================================-->

      <section class="page-header">
        <div>
          <h1>Activity Logs</h1>

          <p>Monitor every administrator activity across the platform.</p>
        </div>
      </section>

      <!--==========================================================

SEARCH

===========================================================-->

      <section class="search-card">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>

          <input
            type="text"
            id="searchActivity"
            placeholder="Search activity..."
          />
        </div>
      </section>

      <!--==========================================================

STATS

===========================================================-->

      <section class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">
            <i class="fa-solid fa-clock-rotate-left"></i>
          </div>

          <div>
            <span>Total Activities</span>

            <h2 id="totalActivities">0</h2>
          </div>
        </div>
      </section>

      <!--==========================================================

ACTIVITY TABLE

===========================================================-->

      <section class="table-card">
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>Admin</th>

                <th>Action</th>

                <th>Target</th>

                <th>Description</th>

                <th>Date</th>
              </tr>
            </thead>

            <tbody id="activityTable"></tbody>
          </table>
        </div>
      </section>

      <!--==========================================================

PAGINATION

===========================================================-->

      <section class="pagination-section">
        <button id="previousPage" class="page-btn">
          <i class="fa-solid fa-chevron-left"></i>

          Previous
        </button>

        <div class="page-info">
          Page

          <span id="currentPage"> 1 </span>

          of

          <span id="totalPages"> 1 </span>
        </div>

        <button id="nextPage" class="page-btn">
          Next

          <i class="fa-solid fa-chevron-right"></i>
        </button>
      </section>
    </main>

    <script src="../js/componentLoader.js"></script>

    <script>
      (async () => {
        await loadComponent(
          "manageNavContainer",

          "../components/manage-navbar.html",
        );

        await loadComponent(
          "modalContainer",

          "../components/confirm-modal.html",
        );

        document.dispatchEvent(new Event("componentsLoaded"));
      })();
    </script>

    <script src="../js/global.js"></script>

    <script src="../js/confirm.js"></script>

    <script src="../js/manage-nav.js"></script>

    <script src="../js/activity-logs.js"></script>
  </body>
</html>
