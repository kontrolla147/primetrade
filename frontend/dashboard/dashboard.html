<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard-nav.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>

  <body>
    <div id="sidebarContainer"></div>

    <div id="modalContainer"></div>

    <!--==========================================================
DASHBOARD HOME
===========================================================-->

    <main class="dashboard-main">
      <!--==========================================================
    WELCOME
    ===========================================================-->

      <section class="dashboard-welcome">
        <div class="welcome-left">
          <h1 id="greeting">Loading...</h1>

          <p>Welcome back to PrimeTrade.</p>

          <p id="welcomeText">Loading...</p>
        </div>

        <div class="welcome-right">
          <span id="currentDate"></span>

          <span id="currentTime"></span>
        </div>
      </section>

      <!--==========================================================
    BALANCE CARDS
    ===========================================================-->

      <section class="dashboard-cards">
        <!-- Total Balance -->

        <div class="dashboard-card">
          <div class="card-icon balance">
            <i class="fa-solid fa-wallet"></i>
          </div>

          <div class="card-content">
            <span>Total Balance</span>

            <h2 id="totalBalance">--</h2>
          </div>
        </div>

        <!-- Total Profit -->

        <div class="dashboard-card">
          <div class="card-icon profit">
            <i class="fa-solid fa-chart-line"></i>
          </div>

          <div class="card-content">
            <span>Total Profit</span>

            <h2 id="totalProfit">--</h2>
          </div>
        </div>

        <!-- Active Investment -->

        <div class="dashboard-card">
          <div class="card-icon investment">
            <i class="fa-solid fa-coins"></i>
          </div>

          <div class="card-content">
            <span>Active Investment</span>

            <h2 id="activeInvestment">--</h2>
          </div>
        </div>

        <!-- Available Balance -->


        <!-- Bonus -->

        <div class="dashboard-card">
          <div class="card-icon bonus">
            <i class="fa-solid fa-gift"></i>
          </div>

          <div class="card-content">
            <span>Bonus</span>

            <h2 id="bonusBalance">--</h2>
          </div>
        </div>
      </section>

      <!--==========================================================
    ACCOUNT STATUS & NOTIFICATIONS
    ===========================================================-->

      <section class="dashboard-grid">
        <!-- Account Status -->

        <div class="dashboard-box">
          <div class="box-title">
            <h2>Account Status</h2>
          </div>

          <div class="status-list">
            <div class="status-item">
              <span>Account Status</span>

              <strong id="accountStatus"> -- </strong>
            </div>

            <div class="status-item">
              <span>KYC Status</span>

              <strong id="kycStatus"> -- </strong>
            </div>

            <div class="status-item">
              <span>Member Since</span>

              <strong id="memberSince"> -- </strong>
            </div>

            <div class="status-item">
              <span>Account Type</span>

              <strong id="accountType"> -- </strong>
            </div>
          </div>
        </div>

        <!-- Notifications -->

        <div class="dashboard-box">
          <div class="box-title">
            <h2>Notifications</h2>
          </div>

          <div id="notificationList"></div>
        </div>
      </section>

      <!--==========================================================
    RECENT TRANSACTIONS
    ===========================================================-->

      <section class="dashboard-box">
        <div class="box-title">
          <h2>Recent Transactions</h2>

          <a href="transactions.html"> View All </a>
        </div>

        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>Type</th>

                <th>Amount</th>

                <th>Date</th>

                <th>Status</th>
              </tr>
            </thead>

            <tbody id="recentTransactions"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="../js/componentLoader.js"></script>

    <script>
      (async () => {
        await loadComponent(
          "sidebarContainer",
          "../components/dashboard-nav.html",
        );

        await loadComponent(
          "modalContainer",
          "../components/confirm-modal.html",
        );

        document.dispatchEvent(new Event("componentsLoaded"));
      })();
    </script>

    <script src="../js/global.js"></script>
    <script src="../js/confirm.js"></script>

    <script src="../js/dashboard-nav.js"></script>
    <script src="../js/dashboard.js"></script>
