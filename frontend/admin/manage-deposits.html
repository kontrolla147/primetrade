<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Deposits | PrimeTrade</title>

    <link rel="stylesheet" href="../css/global.css" />

    <link rel="stylesheet" href="../css/manage-nav.css" />

    <link rel="stylesheet" href="../css/manage-deposits.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>

  <body>
    <div id="manageNavContainer"></div>

    <div id="modalContainer"></div>

    <main class="manage-main">
      <!--==========================================================

PAGE HEADER

===========================================================-->

      <section class="page-header">
        <h1>Manage Deposits</h1>

        <p>Approve and manage customer deposits.</p>
      </section>

      <!--==========================================================

SEARCH

===========================================================-->

      <section class="search-card">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>

          <input
            type="text"
            id="searchDeposit"
            placeholder="Search name, username or email..."
          />
        </div>
      </section>

      <!--==========================================================

DEPOSIT GRID

===========================================================-->

      <section class="deposit-grid" id="depositGrid">
        <!-- Loaded From Backend -->
      </section>
    </main>

    <script src="../js/componentLoader.js"></script>

    <script>
      (async () => {
        await loadComponent(
          "manageNavContainer",

          "../components/manage-navbar.html",
        );

        await loadComponent(
          "modalContainer",

          "../components/confirm-modal.html",
        );

        document.dispatchEvent(new Event("componentsLoaded"));
      })();
    </script>

    <script src="../js/global.js"></script>

    <script src="../js/confirm.js"></script>

    <script src="../js/manage-nav.js"></script>

    <script src="../js/manage-deposits.js"></script>
  </body>
</html>
