<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Wallets | PrimeTrade</title>

    <link rel="stylesheet" href="../css/global.css" />

    <link rel="stylesheet" href="../css/manage-nav.css" />

    <link rel="stylesheet" href="../css/manage-wallets.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>

  <body>
    <div id="manageNavContainer"></div>

    <div id="modalContainer"></div>

    <main class="manage-main">
      <!--==========================================================

PAGE HEADER

===========================================================-->

      <section class="page-header">
        <h1>Wallet Addresses</h1>

        <p>
          Update the cryptocurrency wallet addresses used for customer deposits.
        </p>
      </section>

      <!--==========================================================

WALLET CARD

===========================================================-->

      <section class="wallet-card">
        <div class="wallet-header">
          <i class="fa-solid fa-wallet"></i>

          <h2>Deposit Wallets</h2>
        </div>

        <form id="walletForm">
          <!-- Bitcoin -->

          <div class="form-group">
            <label>
              <i class="fa-brands fa-bitcoin"></i>

              Bitcoin (BTC)
            </label>

            <input
              type="text"
              id="btcWallet"
              placeholder="Enter Bitcoin wallet address"
            />
          </div>

          <!-- Ethereum -->

          <div class="form-group">
            <label>
              <i class="fa-brands fa-ethereum"></i>

              Ethereum (ETH)
            </label>

            <input
              type="text"
              id="ethWallet"
              placeholder="Enter Ethereum wallet address"
            />
          </div>

          <!-- TRC20 -->

          <div class="form-group">
            <label>
              <i class="fa-solid fa-coins"></i>

              USDT (TRC20)
            </label>

            <input
              type="text"
              id="trcWallet"
              placeholder="Enter USDT TRC20 wallet"
            />
          </div>

          <!-- ERC20 -->

          <div class="form-group">
            <label>
              <i class="fa-solid fa-coins"></i>

              USDT (ERC20)
            </label>

            <input
              type="text"
              id="ercWallet"
              placeholder="Enter USDT ERC20 wallet"
            />
          </div>

          <button type="submit" id="saveWallets">
            <i class="fa-solid fa-floppy-disk"></i>

            Save Wallet Addresses
          </button>
        </form>
      </section>
    </main>

    <script src="../js/componentLoader.js"></script>

    <script>
      (async () => {
        await loadComponent(
          "manageNavContainer",

          "../components/manage-navbar.html",
        );

        await loadComponent(
          "modalContainer",

          "../components/confirm-modal.html",
        );

        document.dispatchEvent(new Event("componentsLoaded"));
      })();
    </script>

    <script src="../js/global.js"></script>

    <script src="../js/confirm.js"></script>

    <script src="../js/manage-nav.js"></script>

    <script src="../js/manage-wallets.js"></script>
  </body>
</html>
